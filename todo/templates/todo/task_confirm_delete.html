{% extends 'todo/components/card_layout.html' %}

{% block title %}タスク削除の確認 - ToDo App{% endblock %}

{% block card_content %}
    <div class="w-16 h-16 bg-rose-50 dark:bg-rose-950/50 text-rose-500 dark:text-rose-400 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-bold">
        ⚠️
    </div>

    <h1 class="text-xl font-bold text-slate-900 dark:text-white mb-2">タスクを削除しますか？</h1>
    <p class="text-sm text-slate-500 dark:text-slate-400 mb-6">
        「<span class="font-semibold text-slate-700 dark:text-slate-300">{{ task.title }}</span>」を削除しようとしています。<br>この操作は取り消せません。
    </p>

    <form method="POST">
        {% csrf_token %}
        <div class="flex items-center gap-3">
            <a href="/" class="w-1/2 text-center bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 font-medium py-3 rounded-xl text-sm transition">
                戻る
            </a>
            <button type="submit" class="w-1/2 bg-rose-500 hover:bg-rose-600 text-white font-medium py-3 rounded-xl text-sm transition shadow-md shadow-rose-100 dark:shadow-none">
                削除する
            </button>
        </div>
    </form>
{% endblock %}
