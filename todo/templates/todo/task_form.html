<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タスク編集 - ToDo App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 text-slate-800">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-slate-900 mb-1">
                {% if object %}タスクを編集{% else %}新しいタスク{% endif %}
            </h1>
            <p class="text-sm text-slate-500">必要な情報を入力してください</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            
            <div class="space-y-4 task-form-custom">
                {{ form.as_p }}
            </div>

            <div class="flex items-center gap-3 pt-4">
                <a href="{% url 'task-list' %}" class="w-1/2 text-center bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium py-3 rounded-xl text-sm transition">
                    キャンセル
                </a>
                <button type="submit" class="w-1/2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl text-sm transition shadow-md">
                    保存する
                </button>
            </div>
        </form>
    </div>

</body>
<style>
    .task-form-custom p { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; font-size: 0.875rem; font-weight: 500; color: #475569; }
    .task-form-custom input[type="text"], .task-form-custom textarea { width: 100%; padding: 0.75rem 1rem; border: 1px solid #e2e8f0; border-radius: 0.75rem; font-size: 0.875rem; background-color: #f8fafc; transition: all 0.2s; }
    .task-form-custom input[type="text"]:focus, .task-form-custom textarea:focus { outline: none; border-color: #4f46e5; background-color: #fff; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
    /* チェックボックス用の特殊調整 */
    .task-form-custom p:has(input[type="checkbox"]) { flex-direction: row-reverse; justify-content: flex-end; items-center: center; gap: 0.75rem; background: #f8fafc; padding: 0.75rem 1rem; border: 1px solid #e2e8f0; border-radius: 0.75rem; cursor: pointer; }
    .task-form-custom input[type="checkbox"] { width: 1.25rem; height: 1.25rem; border-radius: 0.375rem; border: 1px solid #cbd5e1; accent-color: #4f46e5; }
</style>
</html>
