<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タスク編集 - Django ToDo App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-100 p-8">
        <div class="mb-6">
            <h2 class="text-xl font-bold text-slate-900">
                {% if view.kwargs.pk %}タスクを編集{% else %}新しいタスクを追加{% endif %}
            </h2>
            <p class="text-sm text-slate-500 mt-1">タスクの内容を入力してください。</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">タイトル</label>
                <input type="text" name="title" value="{{ form.title.value|default:'' }}" required
                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-900 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">説明（詳細）</label>
                <textarea name="description" rows="3"
                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-900 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition">{{ form.description.value|default:'' }}</textarea>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">優先度</label>
                <select name="priority" 
                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition cursor-pointer">
                    <option value="high" {% if form.priority.value == 'high' %}selected{% endif %}>高（最優先）</option>
                    <option value="medium" {% if form.priority.value == 'medium' or not form.priority.value %}selected{% endif %}>中（通常）</option>
                    <option value="low" {% if form.priority.value == 'low' %}selected{% endif %}>低（いつでもいい）</option>
                </select>
            </div>

            {% if view.kwargs.pk %}
            <div class="flex items-center p-3 bg-slate-50 rounded-xl border border-slate-100">
                <input type="checkbox" name="complete" id="id_complete" {% if form.complete.value %}checked{% endif %}
                    class="w-4 h-4 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500 cursor-pointer">
                <label for="id_complete" class="ml-2.5 text-sm font-medium text-slate-700 cursor-pointer select-none">
                    このタスクを完了とする
                </label>
            </div>
            {% endif %}

            <div class="flex items-center justify-end gap-3 pt-2">
                <a href="{% url 'task-list' %}" class="px-4 py-2.5 text-sm font-medium text-slate-500 hover:text-slate-800 transition">
                    キャンセル
                </a>
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-6 py-2.5 rounded-xl text-sm transition shadow-md shadow-indigo-50">
                    保存する
                </button>
            </div>
        </form>
    </div>

</body>
</html>
