{% extends 'todo/components/card_layout.html' %}

{% block title %}{% if view.kwargs.pk %}タスク編集{% else %}タスク作成{% endif %} - Django ToDo App{% endblock %}

{% block card_content %}
    <div class="mb-6">
        <h2 class="text-xl font-bold text-slate-900 dark:text-white">
            {% if view.kwargs.pk %}タスクを編集{% else %}新しいタスクを追加{% endif %}
        </h2>
        <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">タスクの内容を入力してください。</p>
    </div>

    <form method="POST" class="space-y-5">
        {% csrf_token %}

        <div>
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">タイトル</label>
            <input type="text" name="title" value="{{ form.title.value|default:'' }}" required
                class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-sm text-slate-900 dark:text-white focus:outline-none focus:border-indigo-500 dark:focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-indigo-950 transition">
        </div>

        <div>
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">説明（詳細）</label>
            <textarea name="description" rows="3"
                class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-sm text-slate-900 dark:text-white focus:outline-none focus:border-indigo-500 dark:focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-indigo-950 transition">{{ form.description.value|default:'' }}</textarea>
        </div>

        <div>
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">優先度</label>
            <select name="priority" 
                class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-sm text-slate-700 dark:text-slate-200 focus:outline-none focus:border-indigo-500 dark:focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-indigo-950 transition cursor-pointer">
                <option value="high" class="dark:bg-slate-800">高（最優先）</option>
                <option value="medium" class="dark:bg-slate-800">中（通常）</option>
                <option value="low" class="dark:bg-slate-800">低（いつでもいい）</option>
            </select>
        </div>

        <div class="flex items-center justify-end gap-3 pt-2">
            <a href="/" class="px-4 py-2.5 text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 transition">
                キャンセル
            </a>
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-6 py-2.5 rounded-xl text-sm transition shadow-md shadow-indigo-50 dark:shadow-none">
                保存する
            </button>
        </div>
    </form>
{% endblock %}
