{% extends 'todo/base.html' %}

{% block title %}マイタスク - Django ToDo App{% endblock %}

{% block content %}
    {% include 'todo/components/search_filter.html' %}

    <div class="flex justify-end mb-4">
        <a href="{% url 'task-create' %}" class="bg-slate-900 hover:bg-slate-800 text-white text-sm font-medium px-4 py-2.5 rounded-xl transition shadow-sm flex items-center gap-1.5">
            <span>＋</span> 新しいタスクを追加
        </a>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        {% for task in tasks %}
            {% include 'todo/components/task_item.html' %}
        {% empty %}
            <div class="p-12 text-center">
                <p class="text-slate-400 text-sm">該当するタスクが見つかりません。</p>
            </div>
        {% endfor %}
    </div>
{% endblock %}
