<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-900 border-b border-slate-100 dark:border-slate-800/60 hover:bg-slate-50 dark:hover:bg-slate-800/40 transition-colors duration-200 {% if task.complete %}bg-slate-50/50 dark:bg-slate-800/20{% endif %}">
    
    <div class="flex items-center gap-4 flex-1 min-w-0">
        <form action="{% url 'task-update' task.id %}" method="post" class="flex items-center">
            {% csrf_token %}
            <input type="hidden" name="title" value="{{ task.title }}">
            <input type="hidden" name="description" value="{{ task.description }}">
            <input type="hidden" name="priority" value="{{ task.priority }}">
            <input type="hidden" name="complete" value="{% if task.complete %}false{% else %}true{% endif %}">
            
            <button type="submit" class="w-6 h-6 rounded-lg border-2 flex items-center justify-center transition-all 
                {% if task.complete %}
                    bg-emerald-500 border-emerald-500 text-white shadow-sm shadow-emerald-100 dark:shadow-none
                {% else %}
                    border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 hover:border-indigo-500 dark:hover:border-indigo-400 text-slate-800 dark:text-white
                {% endif %}">
                {% if task.complete %}✓{% endif %}
            </button>
        </form>

        <div class="flex flex-col sm:flex-row sm:items-center gap-2 min-w-0 flex-1">
            <a href="{% url 'task-detail' task.id %}" class="text-sm font-medium text-slate-800 dark:text-slate-200 hover:text-indigo-600 dark:hover:text-indigo-400 transition truncate {% if task.complete %}line-through text-slate-400 dark:text-slate-500 font-normal{% endif %}">
                {{ task.title }}
            </a>

            {% if task.priority == 'high' %}
                <span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium bg-rose-50 dark:bg-rose-950/40 text-rose-700 dark:text-rose-400 border border-rose-100 dark:border-rose-900/50 w-fit">高</span>
            {% elif task.priority == 'medium' %}
                <span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium bg-amber-50 dark:bg-amber-950/30 text-amber-700 dark:text-amber-400 border border-amber-100 dark:border-amber-900/40 w-fit">中</span>
            {% else %}
                <span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-600 w-fit">低</span>
            {% endif %}
        </div>
    </div>

    <div class="flex items-center gap-3 pl-4">
        <a href="{% url 'task-update' task.id %}" class="text-slate-400 dark:text-slate-500 hover:text-indigo-600 dark:hover:text-indigo-400 p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition text-sm">
            ✏️
        </a>
        <a href="{% url 'task-delete' task.id %}" class="text-slate-400 dark:text-slate-500 hover:text-rose-600 dark:hover:text-rose-400 p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition text-sm">
            🗑️
        </a>
    </div>

</div>
