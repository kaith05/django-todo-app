{% if request.user.is_authenticated %}
<div class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
    <div>
        <a href="/" class="text-2xl font-bold text-slate-900 hover:text-indigo-600 transition">My Tasks</a>
        <p class="text-sm text-slate-500 mt-1">こんにちは、<span class="font-semibold text-indigo-600">{{ request.user }}</span> さん</p>
    </div>
    <div class="flex items-center gap-4">
        {% if count is not none %}
        <span class="bg-indigo-50 text-indigo-700 text-xs font-semibold px-3 py-1.5 rounded-full border border-indigo-100">
            未完了: <span class="text-sm font-bold">{{ count }}</span> 個
        </span>
        {% endif %}
        
        <form action="{% url 'logout' %}" method="post" class="inline">
            {% csrf_token %}
            <button type="submit" class="text-sm text-slate-400 hover:text-rose-600 transition font-medium">ログアウト</button>
        </form>
    </div>
</div>
{% endif %}
