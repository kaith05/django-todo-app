<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - ToDo App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 text-slate-800">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-indigo-600 mb-2">🚀 My ToDo</h1>
            <p class="text-sm text-slate-500">アカウントにログインしてください</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            
            <div class="space-y-4 login-form-custom">
                {{ form.as_p }}
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl text-sm transition shadow-md shadow-indigo-100 mt-6">
                ログインする
            </button>
        </form>
    </div>

</body>
<style>
    .login-form-custom p { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; font-size: 0.875rem; font-weight: 500; color: #475569; }
    .login-form-custom input { width: 100%; padding: 0.75rem 1rem; border: 1px solid #e2e8f0; border-radius: 0.75rem; font-size: 0.875rem; background-color: #f8fafc; transition: all 0.2s; }
    .login-form-custom input:focus { outline: none; border-color: #4f46e5; background-color: #fff; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
</style>
</html>
